name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake wget build-essential python3-dev \
            pkg-config libgtk2.0-dev

      - name: Build OpenCV 4.6 static
        run: |
          wget -q https://github.com/opencv/opencv/archive/4.6.0.tar.gz
          tar -xzf 4.6.0.tar.gz
          cd opencv-4.6.0 && mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_PERF_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DWITH_GTK=OFF \
            -DWITH_FFMPEG=OFF \
            -DWITH_1394=OFF \
            -DWITH_GSTREAMER=OFF \
            -DWITH_LAPACK=OFF \
            -DWITH_PROTOBUF=ON \
            -DBUILD_PROTOBUF=ON \
            -DBUILD_LIST=core,imgproc,dnn \
            -DCMAKE_INSTALL_PREFIX=/opt/opencv46
          make -j$(nproc)
          sudo make install
          echo "OpenCV_DIR=/opt/opencv46/lib/cmake/opencv4" >> $GITHUB_ENV

      - name: Install ONNX Runtime
        run: |
          wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.18.0/onnxruntime-linux-x64-1.18.0.tgz
          sudo tar -xzf onnxruntime-linux-x64-1.18.0.tgz -C /opt/
          echo "ONNXRUNTIME_ROOT=/opt/onnxruntime-linux-x64-1.18.0" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install ultralytics fast-plate-ocr 'fast-plate-ocr[onnx]' huggingface_hub

      - name: Export models
        run: python export_models.py

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DONNXRUNTIME_ROOT=${{ env.ONNXRUNTIME_ROOT }} -DOpenCV_DIR=${{ env.OpenCV_DIR }}
          make -j$(nproc)

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/**/*.so
            build/**/*.a
            include/**/*.h
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
